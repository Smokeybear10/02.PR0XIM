services:
  - type: web
    name: dr4ft-api
    runtime: python
    rootDir: backend
    plan: free
    region: oregon
    branch: main
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: XAI_API_KEY
        sync: false
      - key: XAI_MODEL
        value: grok-4-fast-non-reasoning
      - key: ALLOWED_ORIGINS
        value: https://proj-dr4ft.vercel.app
